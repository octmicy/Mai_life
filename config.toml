# =============================================================================
# Mai_life「麦麦生活」配置文件
# =============================================================================
# 推荐优先在 MaiBot WebUI 中修改配置；手动编辑时请遵守以下规范：
#
# 1. 不要修改 config_version，它由插件负责升级和迁移。
# 2. 字符串必须放在英文双引号中，例如 city = "Shanghai"。
# 3. 布尔值只能写小写 true 或 false，不能写 True、False、开、关。
# 4. 数字不要加引号，例如 daily_max_per_user = 2。
# 5. 时间统一使用 24 小时 HH:MM 格式，例如 "00:00"、"08:30"。
# 6. 列表使用英文方括号和英文逗号，例如 ["sleep", "nap"]。
# 7. 不要填写 null、None 或留下一半的 TOML 语句，TOML 不支持空值对象。
# 8. QQ 号建议作为字符串填写，避免平台或编辑器处理大整数时发生精度问题。
# 9. 多个私聊用户需要重复添加 [[users.profiles]] 配置块。
# 10. 手动修改后请在 WebUI 重新加载插件，或重启 MaiBot。
#
# 首次使用至少需要修改：
# - [[users.profiles]].user_id：填写你的 QQ 号
# - [[users.profiles]].enabled：改为 true
# - environment.city：填写麦麦生活所在地的城市
# =============================================================================

[plugin]
# 配置结构版本，请勿手动修改。
config_version = "1.5.0"

# 插件总开关。关闭后保留数据库，但停止状态维护、日程生成和主动消息。
enabled = true

# 兼容旧配置的生活生成任务；新功能使用下方 [models] 编排。
llm_model = "planner"

# 管理员 QQ 号列表。留空时，第一个有效私聊用户自动成为管理员。
# 示例：admin_user_ids = ["123456789", "987654321"]
admin_user_ids = []


[users]
# 下面是一个占位用户。首次使用时请填写 user_id，并把 enabled 改为 true。
# 如果需要多个用户，请完整复制一份 [[users.profiles]] 配置块。

[[users.profiles]]
# 必填：QQ 号，必须使用字符串格式。
user_id = ""

# 是否启用该用户的关系档案和生活上下文。
enabled = false

# 是否允许麦麦主动向该用户发送私聊消息。
proactive_enabled = false

# 关系角色：friend / owner。最多只能有一个 owner。
role = "friend"

# -1 按角色自动取值（主人 2、朋友 1），0 表示禁止主动消息。
daily_proactive_max = -1

# 可选：用户称呼，留空不会影响运行。
display_name = ""

# 首次创建档案时的关系温度，范围 0～100。推荐保持 30。
initial_temperature = 30

# 该用户的主动消息免打扰时段，支持跨午夜。
quiet_start = "00:00"
quiet_end = "08:00"

# 是否允许把白名单群聊中的公开话题低频转述到该用户私聊。朋友默认关闭。
group_to_private_enabled = false

# 第二个用户示例：取消下面注释后填写。
# [[users.profiles]]
# user_id = "987654321"
# enabled = true
# proactive_enabled = true
# display_name = "朋友"
# initial_temperature = 30
# quiet_start = "00:00"
# quiet_end = "08:00"


[environment]
# IANA 时区。中国大陆一般使用 Asia/Shanghai。
timezone = "Asia/Shanghai"

# 天气城市。插件会自动把城市名解析成天气坐标，无需填写经纬度。
# 推荐填写常见城市名，例如 "Shanghai"、"Beijing"、"Hangzhou"。
# 如果城市无法识别，请尝试英文名或更完整的城市名称。
city = "Shanghai"

# 天气后台刷新间隔，范围 10～360 分钟。
weather_refresh_minutes = 30


[state]
# 生活状态推进间隔，范围 1～60 分钟。推荐 10 分钟。
tick_interval_minutes = 10

# 身体周期模拟默认关闭。只有符合麦麦人设时才建议开启。
body_cycle_enabled = false

# 周期第 1 天，格式 YYYY-MM-DD；关闭周期时可以留空字符串。
body_cycle_start_date = ""

# 完整周期长度，范围 20～45 天。
body_cycle_length_days = 28

# 经期持续天数，范围 1～10 天。
body_cycle_period_days = 5


[memory]
# 离线生活记忆默认开启；关闭总开关不会删除已有数据。
enabled = true
dream_fragments_enabled = true
dream_fragment_count = 3
diary_enabled = true
diary_hour = 2
diary_max_chars = 1200
important_dates_enabled = true

# 本地规则不能识别日期时是否额外调用快速模型。默认关闭以控制成本。
date_model_analysis_enabled = false
date_candidate_retention_days = 90
date_reminder_lead_days = [30, 7, 1, 0]
skills_enabled = true
skill_daily_gain_max = 1.0
skill_model_analysis_enabled = false


[rest_gate]
# 休息回复闸门默认关闭。开启后，睡眠或午休时可能不回复普通消息。
enabled = false

# 判醒模式：
# - probability：规则边界 + 概率判断，速度快且不额外调用模型
# - llm：规则边界 + LLM 判断，语义更准确但会增加延迟和模型消耗
mode = "probability"

# probability 模式下，普通消息叫醒麦麦的概率。0.18 表示 18%。
wake_probability = 0.18

# llm 模式下的判醒阈值，范围 0～100。
llm_threshold = 70

# 被叫醒后多久不重复判醒，范围 0～240 分钟。
awake_grace_minutes = 30

# 闸门生效的日程类型：sleep / nap / rest。
# 推荐只保留夜间睡眠和午休。
gate_segment_types = ["sleep", "nap"]

# 必须同时位于以下任一时间窗口和休息日程，闸门才生效。
night_start = "22:30"
night_end = "08:00"
nap_start = "12:00"
nap_end = "14:30"


[context]
enabled = true
continuity_enabled = true
continuity_interval_minutes = 10
owner_only_terms = ["主人", "老公", "老婆", "亲爱的主人"]
prompt_max_chars = 2400


[debounce]
enabled = true
text_wait_seconds = 1.2
image_wait_seconds = 3.0
forward_wait_seconds = 2.0
max_wait_seconds = 6.0
max_messages = 12
max_media_bytes = 8388608
outbound_turn_guard = true
turn_expire_seconds = 120


[vision]
enabled = true
timeout_seconds = 6.0
max_images = 6
gif_max_frames = 4
summary_ttl_hours = 24
current_pointer_minutes = 30


[models]
# 这里填写 MaiBot model_task_config 的任务名，而不是模型供应商 ID。
fast_task = "utils"
reasoning_task = "planner"
creative_task = "replyer"
vision_task = "vlm"
schedule_task = ""
rest_wakeup_task = ""
continuity_task = ""
dream_task = ""
vision_summary_task = ""
diary_task = ""
date_analysis_task = ""
skill_task = ""
news_task = ""
search_task = ""
relevance_task = ""
group_judgment_task = ""
relay_summary_task = ""
creation_outline_task = ""
creation_body_task = ""
creation_review_task = ""
reading_annotation_task = ""


[usage]
# 只统计，不设置每日 Token 限额。
enabled = true
retention_days = 30


[schedule]
# 每天强制重新生成生活框架的小时，范围 0～23。
# 插件首次启动且缺少当日日程时仍会立即生成。
generate_hour = 3

# 提前多少分钟细化当前和下一生活场景，范围 10～240 分钟。
detail_lead_minutes = 60

# 日程骨架模板，相对于插件目录。普通用户通常无需修改。
template_file = "mai_template.json"


[proactive]
# 主动私聊总开关。关闭后仍会维护生活状态和日程。
enabled = true

# 检查主动契机的间隔，范围 1～60 分钟。
patrol_interval_minutes = 10

# 每位用户每天实际主动发送上限。Planner 选择沉默时不计数。
daily_max_per_user = 2

# 同一用户两次主动消息之间的最小间隔，单位分钟。
min_interval_minutes = 180

# 用户刚发言后多久不再主动开新话题，单位分钟。
recent_user_silence_minutes = 30

# 主动触发与 Replyer 实际回复的确认窗口，单位秒。通常无需修改。
pending_expire_seconds = 120

# 麦麦低于该精力值时不会进行普通主动聊天。
minimum_energy = 25

# 主动候选进入 Planner 终审所需的最低综合分。越高越克制。
score_threshold = 0.45


[information]
# 联网能力默认全部关闭；需要同时开启这里和对应 news/search 子开关。
enabled = false
association_enabled = true
association_threshold = 0.65
proactive_share_enabled = true
context_item_limit = 3
initial_backoff_minutes = 15
maximum_backoff_minutes = 360


[news]
enabled = false
refresh_minutes = 180
timeout_seconds = 8.0
max_concurrency = 2
max_items_per_source = 10
fetch_full_text = true
max_article_chars = 8000
retention_days = 7

# 新闻源请优先在 WebUI 添加。手动配置示例：
# [[news.sources]]
# source_id = "my-feed"
# enabled = true
# source_type = "rss"
# name = "自建订阅"
# url = "https://rss.example.com/feed.xml"
# api_name = ""


[search]
enabled = false
connector = "searxng"
endpoint = ""
api_key = ""
query_parameter = "q"
results_path = "results"
title_field = "title"
url_field = "url"
snippet_field = "content"
timeout_seconds = 8.0
max_results = 5
daily_max = 1
include_chat_topics = false
interest_keywords = ["科技", "创作", "游戏", "生活方式"]
allowed_schedule_types = ["leisure", "rest"]
note_retention_days = 30


[social]
# 社交能力默认关闭。SnowLuma 与 NapCat 都填写真实 QQ 群号，不填写适配器内部 ID。
enabled = false
owner_group_to_private_enabled = true
observation_wait_seconds = 3.0
max_buffer_messages = 20
inactivity_hours = 6.0
group_share_daily_max = 1
group_share_min_interval_minutes = 360
interesting_threshold = 0.65
summary_retention_hours = 72
relay_pending_seconds = 120

# 群聊和群友关系建议在 WebUI 添加。手动配置示例：
# [[social.groups]]
# group_id = "123456789"
# alias = "朋友群"
# display_name = "朋友群"
# enabled = true
# observe_enabled = true
# relay_target_enabled = true
#
# [[social.relations]]
# group_alias = "朋友群"
# alias = "小明"
# user_id = "987654321"
# display_name = "小明"


[creation]
# 创作和外部阅读默认关闭。作品、日记和批注会以 SQLite 明文保存。
enabled = false
plaintext_storage_acknowledged = false
patrol_interval_minutes = 60
daily_max = 1
minimum_energy = 35
allowed_schedule_types = ["leisure", "rest"]
work_types = ["novel_fragment", "poem", "essay", "screenplay", "storyboard", "character", "worldbuilding"]
public_works_enabled = true
create_share_opportunity = true
inspiration_lookback_days = 7
max_body_chars = 4000

# 外部阅读只调用可选插件 API，不直接联网，也不保存图片或其他二进制。
external_reading_enabled = false
external_reading_api_name = ""
external_reading_max_items = 3
reading_annotation_enabled = true
